<body>
    <script>
        const options = {
            gfm: true,
            breaks: true,
            smartLists: true,
            highlight: function (code) {
                return require('highlight.js').highlightAuto(code).value;
            }
        };
        // 使用 fetch 获取 markdown 文件内容
        fetch('皮卡强的md记忆.md')
            .then(response => response.text())
            .then(text => {
                // 使用 marked 解析 markdown 文件内容
                let parsedContent = marked(text);
                // 将解析后的内容渲染到页面上
                document.getElementById('content').innerHTML = parsedContent;
            });
    </script>
    <div id="content"></div>
    <script src="../marked.min.js"></script>
